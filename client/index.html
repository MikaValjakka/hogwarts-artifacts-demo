<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CORS test</title>
</head>
<body>
<h1>This is a test</h1>
<script>
    fetch('http://localhost:8080/api/v1/users/login', {

            })

</script>
</body>
</html>
